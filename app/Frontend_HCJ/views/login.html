<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/stylesheets/style_login.css">
</head>
<body>

    <div class="container">
        <div class="left">
            <div class="form-copy">
                <p class="eyebrow">Music Player</p>
                <h1>Welcome back</h1>
                <p class="subtitle">Sign in with your username or email and jump straight into your music space.</p>
            </div>
            <form id="loginForm">
                <input type="text" name="username" placeholder="Username">
                <input type="email" name="email" placeholder="Email">
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>
        <div class="right">
            <div class="panel">
                <p class="eyebrow">New Here?</p>
                <h2>Create your account</h2>
                <p>Join as a listener or artist and start building your music library in minutes.</p>
                <a class="secondary-link" href="/register">Register</a>
            </div>
        </div>
    </div>

    <script src="/javascripts/script_login.js"></script>
</body>
</html>
